# Режим работы: "api" или "local"
source: "local"

# --- Настройки для режима "api" (игнорируются если source = local) ---
api-url: "http://example.com/api/permissions"
update-interval-seconds: 60
update-times:
  - "00:00"
  - "05:00"
  - "18:00"

# --- Общие настройки (работают в любом режиме) ---
default-role: "default"
op-role-enabled: true
op-role-name: "OP"

# Команды, для которых требуется указывать время (формат: 1h, 30m, 2d)
time-required-commands:
  - "/ban"
  - "/mute"
  - "/jail"

# --- Локальные роли (используются если source = local) ---
local-roles:
  Вип:
    /help: 60000
    /spawn: 60000
    /list: 60000
    /msg: 30000
  Креатив:
    /help: 50000
    /spawn: 50000
    /list: 50000
    /msg: 25000
    /gamemode creative: 50000
    /heal: 50000
    /fly: 40000
    /feed: 30000
  Админ:
    /help: 45000
    /spawn: 45000
    /list: 45000
    /msg: 20000
    /gamemode creative: 45000
    /heal: 45000
    /fly: 35000
    /feed: 25000
    /home: 45000
    /sethome: 45000
    /warp: 40000
    /back: 40000
  # ... добавьте остальные роли по аналогии

# --- Локальные игроки ---
local-players:
  Steve: "Вип"
  Alex: "Креатив"
  YourName: "Админ"   # замените на свой ник
