name: Build Plugin

on:
  push: # Сборка будет запускаться при каждом изменении кода
    branches: [ "main" ]
  workflow_dispatch: # Позволяет запустить сборку вручную из интерфейса GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Build with Maven
      run: mvn clean package
      
    - name: Upload built JAR
      uses: actions/upload-artifact@v3
      with:
        name: PermsPlugin
        path: target/PermsPlugin-1.0.jar
